<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webradio</title>
    <style>
        /* Design minimaliste : fond noir profond, texte blanc */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Empêche la sélection du texte au clic répété */
            user-select: none; 
            -webkit-user-select: none;
        }
        
        /* Gros bouton central épuré */
        #playBtn {
            background: none;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            outline: none;
        }

        /* Effet de survol pour les ordinateurs */
        @media (hover: hover) {
            #playBtn:hover {
                background-color: #ffffff;
                color: #000000;
            }
        }

        /* Effet visuel discret quand on appuie dessus */
        #playBtn:active {
            transform: scale(0.98);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <button id="playBtn">ÉCOUTER</button>

    <audio id="radioAudio" src="https://archive.org/details/radiopoxe1" preload="none"></audio>

    <script>
        const button = document.getElementById('playBtn');
        const audio = document.getElementById('radioAudio');

        button.addEventListener('click', () => {
            if (audio.paused) {
                // Lance la lecture du fichier depuis Internet Archive
                audio.play()
                .then(() => {
                    button.textContent = "DIFFUSION EN COURS...";
                })
                .catch(error => {
                    console.error("Erreur de lecture :", error);
                    button.textContent = "ERREUR - RÉESSAYER";
                });
            } else {
                // Si l'utilisateur reclique, on coupe le son pour économiser la data
                audio.pause();
                button.textContent = "ÉCOUTER";
            }
        });
    </script>

</body>
</html>
